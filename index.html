<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Media Tamil</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#d60000">
    <style>
        /* மங்கலாக இருக்கும் எழுத்துக்களைத் தெளிவாகக் காட்ட தற்காலிக ஸ்டைல் */
        .services-section {
            background-color: #1a1a1a; /* டார்க் பின்னணி */
            color: #ffffff !important; /* தூய வெள்ளை நிற எழுத்துக்கள் */
            padding: 20px;
            text-align: center;
        }
        .services-section h2 {
            color: #ffcc00 !important; /* தங்க நிற தலைப்பு */
        }
        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }
        .qr-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin: 20px 0;
            background: #fff;
            padding: 20px;
            color: #000;
            border-radius: 10px;
        }
        .qr-image {
            width: 200px;
            height: 200px;
        }
        .logo-img {
            height: 50px;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>
        <img src="12986.png" alt="Life Media Tamil Logo" class="logo-img">
        Life Media Tamil
    </h1>
    <button id="refreshBtn">🔄 Refresh</button>
</header>

<div class="banner-container">
    <img src="13000.png" alt="Life Media Tamil Banner" class="main-banner">
</div>

<section id="breaking">
    <h2>🔥 Breaking News</h2>
    <div id="breakingNews">Loading...</div>
</section>

<section class="services-section">
    <h2>✨ எங்கள் சேவைகள் (Our Services)</h2>
    </section>

<section>
    <h2>📰 Latest News</h2>
    <div id="news"></div>
</section>

<section>
    <h2>📺 Latest Videos</h2>
    <div id="videos"></div>
</section>

<section class="qr-section">
    <h3>எங்கள் QR-ஐ ஸ்கேன் செய்யுங்கள்!</h3>
    <img src="13190.jpg" alt="Life Media Tamil QR Code" class="qr-image">
    <p>(Scan to visit our YouTube Channel)</p>
</section>

<footer>
    <p>© 2026 Life Media Tamil</p>
</footer>

<script src="script.js"></script>
</body>
</html>
