<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Media Tamil</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <meta name="theme-color" content="#d60000">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #d60000;
            color: white;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-container {
            display: flex;
            align-items: center;
        }
        .logo-img {
            height: 50px;
            width: auto;
            margin-right: 10px;
            border-radius: 5px;
        }
        .main-banner {
            width: 100%;
            height: auto;
            display: block;
        }
        section {
            padding: 15px;
            margin: 10px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .services-section {
            background-color: #1a1a1a;
            color: #ffffff !important;
            text-align: center;
        }
        .services-section h2 {
            color: #ffcc00 !important;
        }
        .qr-section {
            text-align: center;
            padding: 20px;
            background: white;
        }
        .qr-image {
            width: 200px;
            height: auto;
            margin: 10px auto;
            display: block;
        }
        #refreshBtn {
            background: white;
            color: #d60000;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        /* கார்டுகளுக்கான பேசிக் ஸ்டைல் */
        .card {
            background: #fff;
            border: 1px solid #ddd;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        .card img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="./12986.png" alt="Life Media Tamil Logo" class="logo-img">
        <h1>Life Media Tamil</h1>
    </div>
    <button id="refreshBtn">🔄 Refresh</button>
</header>

<div class="banner-container">
    <img src="./13000.png" alt="Life Media Tamil Banner" class="main-banner">
</div>

<section id="breaking">
    <h2>🔥 Breaking News</h2>
    <div id="breakingNews">Loading...</div>
</section>

<section class="services-section">
    <h2>✨ எங்கள் சேவைகள் (Our Services)</h2>
    <p>இங்கு உங்கள் சேவைகளின் விவரங்களைச் சேர்க்கலாம்.</p>
</section>

<section>
    <h2>📰 Latest News</h2>
    <div id="news"></div>
</section>

<section>
    <h2>📺 Latest Videos</h2>
    <div id="videos"></div>
</section>

<section class="qr-section">
    <h3>எங்கள் QR-ஐ ஸ்கேன் செய்யுங்கள்!</h3>
    <img src="./13190.jpg" alt="Life Media Tamil QR Code" class="qr-image">
    <p>(Scan to visit our YouTube Channel)</p>
</section>

<footer>
    <p style="text-align: center; padding: 10px; color: #666;">© 2026 Life Media Tamil</p>
</footer>

<script src="script.js"></script>
</body>
</html>
